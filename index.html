<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>互娱二维码</title>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { -webkit-tap-highlight-color: transparent; }
body {
  min-height: 100vh; padding: 16px;
  background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
  display: flex; justify-content: center; align-items: flex-start; padding-top: 30px;
  font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
}
.card {
  background: #fff; border-radius: 20px; padding: 28px 20px;
  width: 100%; max-width: 440px; box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  text-align: center;
}
h1 {
  font-size: 26px; font-weight: 700; margin-bottom: 16px;
  background: linear-gradient(135deg, #667eea, #e84c8b);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.tab-bar { display: flex; margin-bottom: 18px; border-radius: 10px; overflow: hidden; border: 2px solid #e0e0e0; }
.tab-btn {
  flex: 1; padding: 12px 4px; font-size: 13px; font-weight: 600;
  border: none; background: #f8f8f8; color: #999; cursor: pointer;
  outline: none; user-select: none; -webkit-user-select: none;
}
.tab-btn.on { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; }
.page { display: none; }
.page.show { display: block; }

input[type=text], textarea {
  width: 100%; border: 2px solid #e0e0e0; border-radius: 10px; padding: 12px;
  font-size: 16px; font-family: inherit; outline: none; transition: border-color 0.3s;
}
input[type=text]:focus, textarea:focus { border-color: #667eea; }
.btn {
  display: inline-block; padding: 12px 24px; border-radius: 10px; border: none;
  font-size: 15px; font-weight: 600; cursor: pointer;
}
.btn:active { opacity: 0.8; transform: translateY(1px); }
.btn-gen { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; width: 100%; margin-top: 12px; }
.btn-dl { background: linear-gradient(135deg, #43e97b, #38f9d7); color: #fff; flex: 1; }
.btn-cl { background: #f5f5f5; color: #666; flex: 1; }
.btn-row { display: flex; gap: 12px; margin-top: 8px; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
.opts { display: flex; gap: 12px; margin: 14px 0; }
.opt { flex: 1; text-align: left; }
.opt label { display: block; font-size: 12px; color: #888; margin-bottom: 4px; }
.opt input[type=color] { width: 100%; height: 36px; border: 1px solid #ddd; border-radius: 6px; cursor: pointer; }
.opt select { width: 100%; padding: 8px 6px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; outline: none; background: #fff; }
.qr-box { margin: 16px 0 10px; min-height: 160px; display: flex; justify-content: center; align-items: center; }
.qr-box canvas, .qr-box img { max-width: 100%; height: auto !important; border-radius: 12px; }
.placeholder { color: #ccc; font-size: 14px; }
.tip { margin-top: 12px; font-size: 12px; color: #bbb; }

.drop-zone {
  border: 2px dashed #d0d0d0; border-radius: 14px; padding: 28px 16px;
  cursor: pointer; margin-bottom: 12px;
}
.drop-zone.on { border-color: #667eea; background: #f8f6ff; }
.drop-zone .icon { font-size: 38px; margin-bottom: 6px; }
.drop-zone p { font-size: 14px; color: #999; }
.drop-zone strong { color: #667eea; }
.preview { max-width: 160px; max-height: 160px; border-radius: 10px; margin: 0 auto 10px; display: none; }
.status { font-size: 14px; color: #999; margin-bottom: 6px; min-height: 20px; }
.result-card {
  background: #f8f6ff; border: 1px solid #e0d8f0; border-radius: 10px;
  padding: 14px; margin: 10px 0; display: none; text-align: left;
}
.result-card .rlabel { font-size: 11px; color: #888; margin-bottom: 4px; }
.result-card .rtext { font-size: 14px; color: #333; word-break: break-all; max-height: 80px; overflow-y: auto; line-height: 1.5; }
.rtext.link { color: #667eea; text-decoration: underline; cursor: pointer; }
.rbtns { display: none; gap: 8px; margin-top: 8px; }
.rbtns button { flex: 1; padding: 10px 0; border-radius: 8px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; }
.btn-copy { background: #f0f0f0; color: #555; }
.btn-regen { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; }

.img2qr-row { display: none; gap: 16px; align-items: center; justify-content: center; margin: 12px 0; }
.img2qr-row .thumb-wrap, .img2qr-row .qr-wrap-inner { text-align: center; }
.img2qr-row .thumb-label { font-size: 11px; color: #888; margin-bottom: 4px; }
.img2qr-row canvas.thumb { border-radius: 10px; border: 2px solid #e0e0e0; }
.img2qr-info { font-size: 11px; color: #999; margin-bottom: 4px; }

@media (max-width: 380px) {
  .card { padding: 22px 14px; }
  h1 { font-size: 22px; }
  .tab-btn { font-size: 11px; padding: 10px 2px; }
  input[type=text], textarea { font-size: 14px; padding: 10px; }
  .qr-box { min-height: 130px; }
  .drop-zone { padding: 22px 12px; }
  .drop-zone .icon { font-size: 32px; }
  .drop-zone p { font-size: 13px; }
}
</style>
</head>
<body>
<div class="card">
  <h1>互娱二维码</h1>

  <div class="tab-bar">
    <button class="tab-btn on" data-page="gen">生成二维码</button>
    <button class="tab-btn" data-page="scan">识别二维码</button>
    <button class="tab-btn" data-page="img2qr">图片转码</button>
  </div>

  <!-- ============ 生成二维码 ============ -->
  <div class="page show" id="page-gen">
    <input id="genInput" type="text" placeholder="输入网址或文本内容...">
    <div class="opts">
      <div class="opt"><label>前景色</label><input id="genFg" type="color" value="#000000"></div>
      <div class="opt"><label>背景色</label><input id="genBg" type="color" value="#ffffff"></div>
      <div class="opt"><label>尺寸</label><select id="genSize"><option value="180">小</option><option value="240" selected>中</option><option value="320">大</option></select></div>
    </div>
    <div class="qr-box" id="genQr"><span class="placeholder">二维码将显示在这里</span></div>
    <div class="btn-row">
      <button class="btn btn-dl" id="genDownload" disabled>下载图片</button>
      <button class="btn btn-cl" id="genClear">清空</button>
    </div>
    <p class="tip">支持网址、文本、名片信息等</p>
  </div>

  <!-- ============ 识别二维码 ============ -->
  <div class="page" id="page-scan">
    <div class="drop-zone" id="scanDrop">
      <div class="icon">&#x1F4F7;</div>
      <p>点击上传含二维码的图片</p>
      <p style="font-size:11px;margin-top:4px;">支持 JPG / PNG / GIF / BMP</p>
      <input type="file" id="scanFileInput" accept="image/*" style="display:none;">
    </div>
    <img class="preview" id="scanPreview" alt="">
    <div class="status" id="scanStatus"></div>
    <div class="result-card" id="scanResult">
      <div class="rlabel">识别结果</div>
      <div class="rtext" id="scanText"></div>
    </div>
    <div class="rbtns" id="scanBtns">
      <button class="btn-copy" id="scanCopy">复制</button>
      <button class="btn-regen" id="scanRegen">生成二维码</button>
    </div>
  </div>

  <!-- ============ 图片转码 ============ -->
  <div class="page" id="page-img2qr">
    <div class="drop-zone" id="imgDrop">
      <div class="icon">&#x1F5BC;</div>
      <p>上传图片，生成专属二维码</p>
      <p style="font-size:11px;margin-top:4px;">图像将压缩编码后存入二维码中</p>
      <input type="file" id="imgFileInput" accept="image/*" style="display:none;">
    </div>
    <div class="status" id="imgStatus"></div>
    <div class="img2qr-row" id="imgRow">
      <div class="thumb-wrap">
        <div class="thumb-label">原图压缩后</div>
        <canvas class="thumb" id="imgThumb" width="100" height="100"></canvas>
      </div>
      <span style="font-size:20px;color:#ccc;">&rarr;</span>
      <div class="qr-wrap-inner">
        <div class="thumb-label">生成的二维码</div>
        <div id="imgQrBox"></div>
      </div>
    </div>
    <div class="img2qr-info" id="imgInfo"></div>
    <div class="btn-row">
      <button class="btn btn-dl" id="imgDownload" disabled>下载二维码</button>
      <button class="btn btn-cl" id="imgClear">清空</button>
    </div>
    <p class="tip">扫描二维码可直接查看图片内容</p>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  var genQrCode = null;
  var imgQrCode = null;
  var scannedText = '';

  // ====== Tab switching ======
  var tabBtns = document.querySelectorAll('.tab-btn');
  tabBtns.forEach(function(btn) {
    btn.addEventListener('click', function() {
      var pageName = this.getAttribute('data-page');
      tabBtns.forEach(function(b) { b.classList.remove('on'); });
      this.classList.add('on');
      document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('show'); });
      document.getElementById('page-' + pageName).classList.add('show');
    });
  });

  // ====== Generate QR ======
  var genInput = document.getElementById('genInput');
  var genQr = document.getElementById('genQr');
  var genDownload = document.getElementById('genDownload');
  var genFg = document.getElementById('genFg');
  var genBg = document.getElementById('genBg');
  var genSize = document.getElementById('genSize');

  function doGenerate(text) {
    var t = text || genInput.value.trim();
    if (!t) return;
    genQr.innerHTML = '';
    var sz = parseInt(genSize.value);
    genQrCode = new QRCode(genQr, {
      text: t, width: sz, height: sz,
      colorDark: genFg.value, colorLight: genBg.value,
      correctLevel: QRCode.CorrectLevel.H
    });
    genDownload.disabled = false;
  }

  document.getElementById('genInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doGenerate();
  });

  genDownload.addEventListener('click', function() {
    var c = genQr.querySelector('canvas');
    if (!c) return;
    var a = document.createElement('a');
    a.download = '互娱二维码.png'; a.href = c.toDataURL('image/png'); a.click();
  });

  document.getElementById('genClear').addEventListener('click', function() {
    genInput.value = '';
    genQr.innerHTML = '<span class="placeholder">二维码将显示在这里</span>';
    genQrCode = null;
    genDownload.disabled = true;
  });

  genFg.addEventListener('change', function() { if (genQrCode) doGenerate(); });
  genBg.addEventListener('change', function() { if (genQrCode) doGenerate(); });
  genSize.addEventListener('change', function() { if (genQrCode) doGenerate(); });

  // ====== Scan QR ======
  var scanDrop = document.getElementById('scanDrop');
  var scanFileInput = document.getElementById('scanFileInput');
  var scanPreview = document.getElementById('scanPreview');
  var scanStatus = document.getElementById('scanStatus');
  var scanResult = document.getElementById('scanResult');
  var scanText = document.getElementById('scanText');
  var scanBtns = document.getElementById('scanBtns');

  scanDrop.addEventListener('click', function() { scanFileInput.click(); });
  scanFileInput.addEventListener('change', function() {
    if (this.files.length) doScan(this.files[0]);
  });

  scanDrop.addEventListener('dragover', function(e) { e.preventDefault(); this.classList.add('on'); });
  scanDrop.addEventListener('dragleave', function() { this.classList.remove('on'); });
  scanDrop.addEventListener('drop', function(e) {
    e.preventDefault(); this.classList.remove('on');
    if (e.dataTransfer.files.length) doScan(e.dataTransfer.files[0]);
  });

  function doScan(file) {
    if (!file || !file.type.match(/image\//)) {
      scanStatus.textContent = '请选择图片文件'; scanStatus.style.color = '#e74c3c'; return;
    }
    scanStatus.textContent = '正在识别...'; scanStatus.style.color = '#999';
    scanResult.style.display = 'none'; scanBtns.style.display = 'none';

    var reader = new FileReader();
    reader.onload = function(e) {
      var img = new Image();
      img.onload = function() {
        scanPreview.src = e.target.result; scanPreview.style.display = 'block';
        var cvs = document.createElement('canvas');
        cvs.width = img.width; cvs.height = img.height;
        var ctx = cvs.getContext('2d');
        ctx.drawImage(img, 0, 0);
        var imageData = ctx.getImageData(0, 0, cvs.width, cvs.height);
        var code = jsQR(imageData.data, cvs.width, cvs.height);
        if (code) {
          scannedText = code.data;
          scanStatus.textContent = '识别成功'; scanStatus.style.color = '#27ae60';
          scanText.textContent = code.data;
          scanText.className = 'rtext' + (/^https?:\/\//i.test(code.data) ? ' link' : '');
          scanResult.style.display = 'block'; scanBtns.style.display = 'flex';
        } else {
          scanStatus.textContent = '未识别到二维码'; scanStatus.style.color = '#e74c3c';
        }
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  document.getElementById('scanCopy').addEventListener('click', function() {
    if (!scannedText) return;
    navigator.clipboard.writeText(scannedText).then(function() {
      scanStatus.textContent = '已复制到剪贴板'; scanStatus.style.color = '#27ae60';
    }).catch(function() {
      scanStatus.textContent = '复制失败，请手动复制'; scanStatus.style.color = '#e74c3c';
    });
  });

  document.getElementById('scanRegen').addEventListener('click', function() {
    if (!scannedText) return;
    genInput.value = scannedText;
    document.querySelector('.tab-btn[data-page="gen"]').click();
    doGenerate(scannedText);
  });

  // ====== Image to QR ======
  var imgDrop = document.getElementById('imgDrop');
  var imgFileInput = document.getElementById('imgFileInput');
  var imgStatus = document.getElementById('imgStatus');
  var imgRow = document.getElementById('imgRow');
  var imgThumb = document.getElementById('imgThumb');
  var imgQrBox = document.getElementById('imgQrBox');
  var imgInfo = document.getElementById('imgInfo');
  var imgDownload = document.getElementById('imgDownload');

  imgDrop.addEventListener('click', function() { imgFileInput.click(); });
  imgFileInput.addEventListener('change', function() {
    if (this.files.length) doImgEncode(this.files[0]);
  });

  imgDrop.addEventListener('dragover', function(e) { e.preventDefault(); this.classList.add('on'); });
  imgDrop.addEventListener('dragleave', function() { this.classList.remove('on'); });
  imgDrop.addEventListener('drop', function(e) {
    e.preventDefault(); this.classList.remove('on');
    if (e.dataTransfer.files.length) doImgEncode(e.dataTransfer.files[0]);
  });

  function doImgEncode(file) {
    if (!file || !file.type.match(/image\//)) {
      imgStatus.textContent = '请选择图片文件'; imgStatus.style.color = '#e74c3c'; return;
    }
    imgStatus.textContent = '正在压缩编码...'; imgStatus.style.color = '#999';

    var reader = new FileReader();
    reader.onload = function(e) {
      var img = new Image();
      img.onload = function() {
        var maxDim = 60;
        var w = img.width, h = img.height;
        if (w > h) { w = Math.min(w, maxDim); h = Math.round(h * w / img.width); }
        else { h = Math.min(h, maxDim); w = Math.round(w * h / img.height); }
        if (w < 1) w = 1; if (h < 1) h = 1;

        imgThumb.width = w; imgThumb.height = h;
        var ctx = imgThumb.getContext('2d');
        ctx.clearRect(0, 0, w, h);
        ctx.drawImage(img, 0, 0, w, h);

        var dataUrl = null;
        for (var q = 0.5; q >= 0.03; q -= 0.03) {
          var test = imgThumb.toDataURL('image/jpeg', q);
          if (test.length < 2500) { dataUrl = test; break; }
        }
        if (!dataUrl) { dataUrl = imgThumb.toDataURL('image/jpeg', 0.03); }

        var bytes = Math.round(dataUrl.length * 0.75);
        imgInfo.textContent = '编码大小: ' + dataUrl.length + ' 字符 (~' + bytes + ' bytes)';

        if (dataUrl.length > 2900) {
          imgStatus.textContent = '图片过大，请使用更小的图片'; imgStatus.style.color = '#e74c3c';
          imgRow.style.display = 'none'; return;
        }

        imgStatus.textContent = '生成成功，扫描二维码即可查看图片'; imgStatus.style.color = '#27ae60';
        imgRow.style.display = 'flex';

        imgQrBox.innerHTML = '';
        imgQrCode = new QRCode(imgQrBox, {
          text: dataUrl, width: 110, height: 110,
          correctLevel: QRCode.CorrectLevel.M
        });
        imgDownload.disabled = false;
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  imgDownload.addEventListener('click', function() {
    var c = imgQrBox.querySelector('canvas');
    if (!c) return;
    var a = document.createElement('a');
    a.download = '图片二维码.png'; a.href = c.toDataURL('image/png'); a.click();
  });

  document.getElementById('imgClear').addEventListener('click', function() {
    imgFileInput.value = ''; imgQrBox.innerHTML = '';
    var ctx = imgThumb.getContext('2d');
    ctx.clearRect(0, 0, imgThumb.width, imgThumb.height);
    imgThumb.width = 100; imgThumb.height = 100;
    imgRow.style.display = 'none'; imgInfo.textContent = '';
    imgStatus.textContent = ''; imgQrCode = null; imgDownload.disabled = true;
  });

});
</script>
</body>
</html>
