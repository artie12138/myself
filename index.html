<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>互娱二维码</title>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  min-height: 100vh;
  background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
  display: flex; justify-content: center; align-items: center;
  font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
}
.card {
  background: #ffffff; border-radius: 20px; padding: 40px 36px 32px;
  width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,0.4); text-align: center;
}
h1 {
  font-size: 28px; font-weight: 700;
  background: linear-gradient(135deg, #667eea, #e84c8b);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; margin-bottom: 6px;
}
.subtitle { font-size: 13px; color: #999; margin-bottom: 24px; }
.input-group {
  display: flex; gap: 0; border: 2px solid #e0e0e0; border-radius: 10px;
  overflow: hidden; transition: border-color 0.3s;
}
.input-group:focus-within { border-color: #667eea; }
.input-group input {
  flex: 1; border: none; outline: none; padding: 12px 16px;
  font-size: 14px; font-family: inherit;
}
.input-group button {
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: #fff; border: none; padding: 12px 20px; cursor: pointer;
  font-size: 14px; font-weight: 600; white-space: nowrap; transition: opacity 0.2s;
}
.input-group button:hover { opacity: 0.9; }
.options { display: flex; gap: 16px; margin: 18px 0; }
.option { flex: 1; text-align: left; }
.option label { display: block; font-size: 12px; color: #888; margin-bottom: 4px; }
.option input[type="color"] { width: 100%; height: 34px; border: 1px solid #ddd; border-radius: 6px; cursor: pointer; }
.option select { width: 100%; padding: 7px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; outline: none; }
.qr-wrap { margin: 20px 0 16px; min-height: 200px; display: flex; justify-content: center; align-items: center; }
.qr-wrap .placeholder { color: #ccc; font-size: 14px; }
.qr-wrap img, .qr-wrap canvas { border-radius: 12px; }
.actions { display: flex; gap: 12px; }
.actions button {
  flex: 1; padding: 11px 0; border-radius: 10px; border: none;
  font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s;
}
.btn-download {
  background: linear-gradient(135deg, #43e97b, #38f9d7); color: #fff;
}
.btn-download:hover { opacity: 0.9; transform: translateY(-1px); }
.btn-clear {
  background: #f5f5f5; color: #666;
}
.btn-clear:hover { background: #eee; }
.actions button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
.tip { margin-top: 16px; font-size: 11px; color: #bbb; }
</style>
</head>
<body>
<div class="card">
  <h1>互娱二维码</h1>
  <p class="subtitle">输入链接或文本，即刻生成二维码</p>

  <div class="input-group">
    <input id="textInput" type="text" placeholder="输入网址或文本内容..." autofocus>
    <button id="generateBtn">生成</button>
  </div>

  <div class="options">
    <div class="option">
      <label>前景色</label>
      <input type="color" id="fgColor" value="#000000">
    </div>
    <div class="option">
      <label>背景色</label>
      <input type="color" id="bgColor" value="#ffffff">
    </div>
    <div class="option">
      <label>尺寸</label>
      <select id="sizeSelect">
        <option value="180">小 (180px)</option>
        <option value="240" selected>中 (240px)</option>
        <option value="320">大 (320px)</option>
      </select>
    </div>
  </div>

  <div class="qr-wrap" id="qrWrap">
    <span class="placeholder">二维码将显示在这里</span>
  </div>

  <div class="actions">
    <button class="btn-download" id="downloadBtn" disabled>下载图片</button>
    <button class="btn-clear" id="clearBtn">清空</button>
  </div>
  <p class="tip">支持网址、文本、名片信息等 · 点击下载保存 PNG 图片</p>
</div>

<script>
let qrCode = null;
const textInput = document.getElementById("textInput");
const qrWrap = document.getElementById("qrWrap");
const downloadBtn = document.getElementById("downloadBtn");
const fgColor = document.getElementById("fgColor");
const bgColor = document.getElementById("bgColor");
const sizeSelect = document.getElementById("sizeSelect");

function generate() {
  const text = textInput.value.trim();
  if (!text) return;
  qrWrap.innerHTML = "";
  const size = parseInt(sizeSelect.value);
  qrCode = new QRCode(qrWrap, {
    text: text,
    width: size,
    height: size,
    colorDark: fgColor.value,
    colorLight: bgColor.value,
    correctLevel: QRCode.CorrectLevel.H,
  });
  downloadBtn.disabled = false;
}

function download() {
  const canvas = qrWrap.querySelector("canvas");
  if (!canvas) return;
  const a = document.createElement("a");
  a.download = "互娱二维码.png";
  a.href = canvas.toDataURL("image/png");
  a.click();
}

document.getElementById("generateBtn").addEventListener("click", generate);
textInput.addEventListener("keydown", function(e) { if (e.key === "Enter") generate(); });
downloadBtn.addEventListener("click", download);

document.getElementById("clearBtn").addEventListener("click", function() {
  textInput.value = "";
  qrWrap.innerHTML = '<span class="placeholder">二维码将显示在这里</span>';
  qrCode = null;
  downloadBtn.disabled = true;
});

fgColor.addEventListener("change", function() { if (qrCode) generate(); });
bgColor.addEventListener("change", function() { if (qrCode) generate(); });
sizeSelect.addEventListener("change", function() { if (qrCode) generate(); });
</script>
</body>
</html>
