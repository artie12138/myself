<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>互娱二维码</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { -webkit-tap-highlight-color: transparent; }
body {
  min-height: 100vh; padding: 16px;
  background: #0a0a1a;
  display: flex; flex-direction: column; align-items: center;
  font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
  overflow-x: hidden; gap: 0;
}
#bgCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
.card {
  background: #1a1a2e; border: 4px solid #4a4a6a;
  box-shadow:
    4px 4px 0 #2a2a4a,
    8px 8px 0 #15152a,
    0 0 30px rgba(102, 126, 234, 0.15),
    0 0 80px rgba(102, 126, 234, 0.08),
    0 0 120px rgba(167, 94, 234, 0.05),
    inset 0 0 60px rgba(0,0,0,0.3);
  width: 100%; max-width: 440px; text-align: center;
  position: relative; z-index: 1;
  padding: 0;
  image-rendering: pixelated;
  animation: crtFlicker 4s ease-in-out infinite;
}
@keyframes crtFlicker {
  0%, 100% { box-shadow: 4px 4px 0 #2a2a4a, 8px 8px 0 #15152a, 0 0 30px rgba(102,126,234,0.15), 0 0 80px rgba(102,126,234,0.08), 0 0 120px rgba(167,94,234,0.05), inset 0 0 60px rgba(0,0,0,0.3); }
  50% { box-shadow: 4px 4px 0 #2a2a4a, 8px 8px 0 #15152a, 0 0 35px rgba(102,126,234,0.2), 0 0 90px rgba(102,126,234,0.12), 0 0 140px rgba(167,94,234,0.08), inset 0 0 60px rgba(0,0,0,0.3); }
}

/* pixel divider between logo and card */
.px-divider {
  display: flex; align-items: center; gap: 6px; margin-bottom: 28px; z-index: 1;
}
.px-divider .px-line {
  width: 60px; height: 4px; background: repeating-linear-gradient(90deg, #667eea 0, #667eea 8px, transparent 8px, transparent 12px);
}
.px-divider .px-diamond {
  width: 12px; height: 12px; background: #ff4757; transform: rotate(45deg);
  box-shadow: 0 0 8px rgba(255,71,87,0.5);
  animation: diamondPulse 1.5s ease-in-out infinite;
}
@keyframes diamondPulse {
  0%, 100% { opacity: 0.6; transform: rotate(45deg) scale(0.8); }
  50% { opacity: 1; transform: rotate(45deg) scale(1.2); }
}
/* screen area */
.screen {
  background: #f5f7fa; margin: 16px 16px 0; border-radius: 8px 8px 0 0;
  padding: 20px 16px; min-height: 280px;
  border: 3px solid #333; border-bottom: none;
  box-shadow: inset 0 0 30px rgba(0,0,0,0.1);
  position: relative;
}
/* scanlines effect */
.screen::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.02) 2px, rgba(0,0,0,0.02) 4px);
  pointer-events: none; border-radius: 5px 5px 0 0; z-index: 5;
}
/* pixel corners */
.card::before {
  content: ''; position: absolute; top: -4px; left: -4px;
  width: 16px; height: 16px; background: #667eea; z-index: 2;
  box-shadow: 20px 0 0 #ff4757, 40px 0 0 #2ed573, 60px 0 0 #ffa502;
}
.card::after {
  content: ''; position: absolute; bottom: -4px; right: -4px;
  width: 16px; height: 16px; background: #ff4757; z-index: 2;
  box-shadow: -20px 0 0 #667eea, -40px 0 0 #2ed573, -60px 0 0 #ffa502;
}
#pixel-logo {
  position: relative; z-index: 1; margin-bottom: 36px; margin-top: 20px;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
#pixel-logo .char-block {
  width: 56px; height: 56px; border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  font-size: 30px; font-weight: 900; color: #fff; position: relative;
  font-family: 'Press Start 2P', 'PingFang SC', monospace;
  text-shadow: 0 3px 0 rgba(0,0,0,0.35);
  animation: logoBounce 2s ease-in-out infinite;
  letter-spacing: -2px;
}
#pixel-logo .char-block:nth-child(1) { animation-delay: 0s; }
#pixel-logo .char-block:nth-child(2) { animation-delay: 0.15s; }
#pixel-logo .char-block:nth-child(3) { animation-delay: 0.3s; }
#pixel-logo .char-block:nth-child(4) { animation-delay: 0.45s; }
#pixel-logo .char-block:nth-child(5) { animation-delay: 0.6s; }
@keyframes logoBounce {
  0%, 100% { transform: translateY(0); }
  30% { transform: translateY(-6px); }
  50% { transform: translateY(0); }
}
.char-block::after {
  content: ''; position: absolute; top: 4px; left: 4px; right: 8px; bottom: 8px;
  background: rgba(255,255,255,0.18); border-radius: 2px;
}
.char-block .px-dot {
  position: absolute; width: 6px; height: 6px; background: rgba(0,0,0,0.2); border-radius: 1px;
}
.char-block .px-dot:nth-child(1) { top: 8px; left: 10px; }
.char-block .px-dot:nth-child(2) { bottom: 8px; right: 10px; }
.cb-red    { background: #ff4757; box-shadow: 0 6px 0 #b8313f, 0 8px 12px rgba(0,0,0,0.3); }
.cb-purple { background: #a55eea; box-shadow: 0 6px 0 #6c3483, 0 8px 12px rgba(0,0,0,0.3); }
.cb-orange { background: #ffa502; box-shadow: 0 6px 0 #cc7a00, 0 8px 12px rgba(0,0,0,0.3); }
.cb-green  { background: #2ed573; box-shadow: 0 6px 0 #1a7a3a, 0 8px 12px rgba(0,0,0,0.3); }
.cb-blue   { background: #1e90ff; box-shadow: 0 6px 0 #1155aa, 0 8px 12px rgba(0,0,0,0.3); }

/* pixel decorations around logo */
.px-deco {
  position: absolute; border-radius: 2px; z-index: -1;
  animation: decoFloat 3s ease-in-out infinite;
}
.px-deco.sm { width: 8px; height: 8px; }
.px-deco.md { width: 12px; height: 12px; }
@keyframes decoFloat {
  0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.7; }
  50% { transform: translateY(-12px) rotate(10deg); opacity: 1; }
}

.card {
  background: #fff; border-radius: 20px; padding: 28px 20px;
.tab-bar { display: flex; padding: 0 16px; gap: 0; margin-bottom: 0; }
.tab-btn {
  flex: 1; padding: 14px 4px; font-size: 13px; font-weight: 700;
  border: none; cursor: pointer; outline: none;
  user-select: none; -webkit-user-select: none;
  background: #2a2a4a; color: #888; position: relative;
  border-bottom: 3px solid #3a3a5a; transition: all 0.15s;
  font-family: inherit;
}
.tab-btn:first-child { border-radius: 8px 0 0 0; }
.tab-btn:last-child { border-radius: 0 8px 0 0; }
.tab-btn.on {
  background: #f5f7fa; color: #1a1a2e;
  border-bottom-color: #f5f7fa;
}
/* bottom button bar */
.btn-bar {
  display: flex; gap: 10px; padding: 14px 16px 16px;
  background: #f5f7fa;
  border-radius: 0 0 6px 6px;
  margin: 0 16px;
}
.btn-bar:last-child { border-radius: 0 0 0 0; }
.page { display: none; }
.page.show { display: block; }

input[type=text], textarea {
  width: 100%; border: 2px solid #d0d0d0; border-radius: 6px; padding: 12px;
  font-size: 16px; font-family: inherit; outline: none; transition: border-color 0.3s;
  background: #fff;
}
input[type=text]:focus, textarea:focus { border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.15); }
.btn {
  display: inline-block; padding: 14px 20px; border: none;
  font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit;
  position: relative; text-transform: none;
}
.btn:active { transform: translateY(2px); }
.btn-gen {
  background: #667eea; color: #fff; width: 100%; margin-top: 12px;
  box-shadow: 0 4px 0 #4455aa, 0 6px 10px rgba(0,0,0,0.2);
  border-radius: 6px;
}
.btn-dl {
  background: #2ed573; color: #fff; flex: 1;
  box-shadow: 0 4px 0 #1a8a3a, 0 6px 10px rgba(0,0,0,0.2);
  border-radius: 6px;
}
.btn-dl:active { box-shadow: 0 2px 0 #1a8a3a; }
.btn-cl {
  background: #3a3a5a; color: #aaa; flex: 1;
  box-shadow: 0 4px 0 #2a2a4a, 0 6px 10px rgba(0,0,0,0.2);
  border-radius: 6px;
}
.btn-cl:active { box-shadow: 0 2px 0 #2a2a4a; }
.btn-row { display: flex; gap: 12px; margin-top: 0; }
.btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
.btn:disabled:active { transform: none; box-shadow: 0 4px 0 rgba(0,0,0,0.3); }
.opts { display: flex; gap: 12px; margin: 14px 0; }
.opt { flex: 1; text-align: left; }
.opt label { display: block; font-size: 11px; color: #777; margin-bottom: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
.opt input[type=color] { width: 100%; height: 36px; border: 2px solid #ddd; border-radius: 4px; cursor: pointer; }
.opt select { width: 100%; padding: 8px 6px; border: 2px solid #ddd; border-radius: 4px; font-size: 14px; outline: none; background: #fff; }
.qr-box { margin: 16px 0 10px; min-height: 160px; display: flex; justify-content: center; align-items: center; }
.qr-box canvas, .qr-box img { max-width: 100%; height: auto !important; border-radius: 12px; }
.placeholder { color: #ccc; font-size: 14px; }
.tip { margin-top: 12px; font-size: 11px; color: #888; }

.drop-zone {
  border: 2px dashed #ccc; border-radius: 8px; padding: 28px 16px;
  cursor: pointer; margin-bottom: 12px; background: #fff;
}
.drop-zone.on { border-color: #667eea; background: #f8f6ff; }
.drop-zone .icon { font-size: 38px; margin-bottom: 6px; }
.drop-zone p { font-size: 14px; color: #999; }
.drop-zone strong { color: #667eea; }
.preview { max-width: 160px; max-height: 160px; border-radius: 10px; margin: 0 auto 10px; display: none; }
.status { font-size: 14px; color: #999; margin-bottom: 6px; min-height: 20px; }
.result-card {
  background: #f8f6ff; border: 1px solid #e0d8f0; border-radius: 10px;
  padding: 14px; margin: 10px 0; display: none; text-align: left;
}
.result-card .rlabel { font-size: 11px; color: #888; margin-bottom: 4px; }
.result-card .rtext { font-size: 14px; color: #333; word-break: break-all; max-height: 80px; overflow-y: auto; line-height: 1.5; }
.rtext.link { color: #667eea; text-decoration: underline; cursor: pointer; }

.img2qr-row { display: none; gap: 16px; align-items: center; justify-content: center; margin: 12px 0; }
.img2qr-row .thumb-wrap, .img2qr-row .qr-wrap-inner { text-align: center; }
.img2qr-row .thumb-label { font-size: 11px; color: #888; margin-bottom: 4px; }
.img2qr-row canvas.thumb { border-radius: 10px; border: 2px solid #e0e0e0; }
.img2qr-info { font-size: 11px; color: #999; margin-bottom: 4px; }

@media (max-width: 380px) {
  .screen { margin: 10px 10px 0; padding: 14px 10px; min-height: 240px; }
  .btn-bar { padding: 10px; gap: 8px; }
  #pixel-logo { gap: 4px; margin-bottom: 14px; }
  #pixel-logo .char-block { width: 42px; height: 42px; font-size: 24px; }
  .tab-btn { font-size: 11px; padding: 12px 2px; }
  input[type=text], textarea { font-size: 14px; padding: 10px; }
  .qr-box { min-height: 120px; }
  .drop-zone { padding: 20px 10px; }
  .drop-zone .icon { font-size: 32px; }
  .drop-zone p { font-size: 13px; }
  .card::before, .card::after { width: 10px; height: 10px; }
  .card::before { box-shadow: 14px 0 0 #ff4757, 28px 0 0 #2ed573, 42px 0 0 #ffa502; }
  .card::after { box-shadow: -14px 0 0 #667eea, -28px 0 0 #2ed573, -42px 0 0 #ffa502; }
}
</style>
</head>
<body>
<canvas id="bgCanvas"></canvas>
<div id="pixel-logo">
  <div class="px-deco sm" style="top:-12px;left:-16px;background:#ff4757;animation-delay:0s;"></div>
  <div class="px-deco md" style="top:-8px;right:-20px;background:#2ed573;animation-delay:0.5s;"></div>
  <div class="px-deco sm" style="bottom:-6px;left:-10px;background:#1e90ff;animation-delay:1s;"></div>
  <div class="px-deco md" style="bottom:-14px;right:-10px;background:#ffa502;animation-delay:1.5s;"></div>
  <div class="px-deco sm" style="top:20px;left:-22px;background:#a55eea;animation-delay:2s;"></div>
  <div class="px-deco sm" style="top:16px;right:-18px;background:#ffdd59;animation-delay:2.5s;"></div>
  <div class="char-block cb-red"><span class="px-dot"></span><span class="px-dot"></span>互</div>
  <div class="char-block cb-purple"><span class="px-dot"></span><span class="px-dot"></span>娱</div>
  <div class="char-block cb-orange"><span class="px-dot"></span><span class="px-dot"></span>二</div>
  <div class="char-block cb-green"><span class="px-dot"></span><span class="px-dot"></span>维</div>
  <div class="char-block cb-blue"><span class="px-dot"></span><span class="px-dot"></span>码</div>
</div>
<div class="px-divider">
  <div class="px-line"></div>
  <div class="px-diamond"></div>
  <div class="px-line"></div>
</div>
<div class="card">

  <div class="tab-bar">
    <button class="tab-btn on" data-page="gen">生成二维码</button>
    <button class="tab-btn" data-page="scan">识别二维码</button>
    <button class="tab-btn" data-page="img2qr">图片转码</button>
  </div>

  <!-- ============ 生成二维码 ============ -->
  <div class="page show" id="page-gen">
    <div class="screen">
      <input id="genInput" type="text" placeholder="输入网址或文本内容...">
      <div class="opts">
        <div class="opt"><label>前景色</label><input id="genFg" type="color" value="#000000"></div>
        <div class="opt"><label>背景色</label><input id="genBg" type="color" value="#ffffff"></div>
        <div class="opt"><label>尺寸</label><select id="genSize"><option value="180">小</option><option value="240" selected>中</option><option value="320">大</option></select></div>
      </div>
      <div class="qr-box" id="genQr"><span class="placeholder">二维码将显示在这里</span></div>
    </div>
    <div class="btn-bar">
      <button class="btn btn-dl" id="genDownload" disabled>下载图片</button>
      <button class="btn btn-cl" id="genClear">清空</button>
    </div>
  </div>

  <!-- ============ 识别二维码 ============ -->
  <div class="page" id="page-scan">
    <div class="screen">
      <div class="drop-zone" id="scanDrop">
        <div class="icon">&#x1F4F7;</div>
        <p>点击上传含二维码的图片</p>
        <p style="font-size:11px;margin-top:4px;">支持 JPG / PNG / GIF / BMP</p>
        <input type="file" id="scanFileInput" accept="image/*" style="display:none;">
      </div>
      <img class="preview" id="scanPreview" alt="">
      <div class="status" id="scanStatus"></div>
      <div class="result-card" id="scanResult">
        <div class="rlabel">识别结果</div>
        <div class="rtext" id="scanText"></div>
      </div>
    </div>
    <div class="btn-bar" id="scanBtns" style="display:none;">
      <button class="btn btn-cl" id="scanCopy">复制</button>
      <button class="btn btn-dl" id="scanRegen">生成二维码</button>
    </div>
  </div>

  <!-- ============ 图片转码 ============ -->
  <div class="page" id="page-img2qr">
    <div class="screen">
      <div class="drop-zone" id="imgDrop">
        <div class="icon">&#x1F5BC;</div>
        <p>上传图片，生成专属二维码</p>
        <p style="font-size:11px;margin-top:4px;">图像将压缩编码后存入二维码中</p>
        <input type="file" id="imgFileInput" accept="image/*" style="display:none;">
      </div>
      <div class="status" id="imgStatus"></div>
      <div class="img2qr-row" id="imgRow">
        <div class="thumb-wrap">
          <div class="thumb-label">原图压缩后</div>
          <canvas class="thumb" id="imgThumb" width="100" height="100"></canvas>
        </div>
        <span style="font-size:20px;color:#ccc;">&rarr;</span>
        <div class="qr-wrap-inner">
          <div class="thumb-label">生成的二维码</div>
          <div id="imgQrBox"></div>
        </div>
      </div>
      <div class="img2qr-info" id="imgInfo"></div>
    </div>
    <div class="btn-bar">
      <button class="btn btn-dl" id="imgDownload" disabled>下载二维码</button>
      <button class="btn btn-cl" id="imgClear">清空</button>
    </div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  var genQrCode = null;
  var imgQrCode = null;
  var scannedText = '';

  // ====== Tab switching ======
  var tabBtns = document.querySelectorAll('.tab-btn');
  tabBtns.forEach(function(btn) {
    btn.addEventListener('click', function() {
      var pageName = this.getAttribute('data-page');
      tabBtns.forEach(function(b) { b.classList.remove('on'); });
      this.classList.add('on');
      document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('show'); });
      document.getElementById('page-' + pageName).classList.add('show');
    });
  });

  // ====== Generate QR ======
  var genInput = document.getElementById('genInput');
  var genQr = document.getElementById('genQr');
  var genDownload = document.getElementById('genDownload');
  var genFg = document.getElementById('genFg');
  var genBg = document.getElementById('genBg');
  var genSize = document.getElementById('genSize');

  function doGenerate(text) {
    var t = text || genInput.value.trim();
    if (!t) return;
    genQr.innerHTML = '';
    var sz = parseInt(genSize.value);
    genQrCode = new QRCode(genQr, {
      text: t, width: sz, height: sz,
      colorDark: genFg.value, colorLight: genBg.value,
      correctLevel: QRCode.CorrectLevel.H
    });
    genDownload.disabled = false;
  }

  document.getElementById('genInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doGenerate();
  });

  genDownload.addEventListener('click', function() {
    var c = genQr.querySelector('canvas');
    if (!c) return;
    var a = document.createElement('a');
    a.download = '互娱二维码.png'; a.href = c.toDataURL('image/png'); a.click();
  });

  document.getElementById('genClear').addEventListener('click', function() {
    genInput.value = '';
    genQr.innerHTML = '<span class="placeholder">二维码将显示在这里</span>';
    genQrCode = null;
    genDownload.disabled = true;
  });

  genFg.addEventListener('change', function() { if (genQrCode) doGenerate(); });
  genBg.addEventListener('change', function() { if (genQrCode) doGenerate(); });
  genSize.addEventListener('change', function() { if (genQrCode) doGenerate(); });

  // ====== Scan QR ======
  var scanDrop = document.getElementById('scanDrop');
  var scanFileInput = document.getElementById('scanFileInput');
  var scanPreview = document.getElementById('scanPreview');
  var scanStatus = document.getElementById('scanStatus');
  var scanResult = document.getElementById('scanResult');
  var scanText = document.getElementById('scanText');
  var scanBtns = document.getElementById('scanBtns');

  scanDrop.addEventListener('click', function() { scanFileInput.click(); });
  scanFileInput.addEventListener('change', function() {
    if (this.files.length) doScan(this.files[0]);
  });

  scanDrop.addEventListener('dragover', function(e) { e.preventDefault(); this.classList.add('on'); });
  scanDrop.addEventListener('dragleave', function() { this.classList.remove('on'); });
  scanDrop.addEventListener('drop', function(e) {
    e.preventDefault(); this.classList.remove('on');
    if (e.dataTransfer.files.length) doScan(e.dataTransfer.files[0]);
  });

  function doScan(file) {
    if (!file || !file.type.match(/image\//)) {
      scanStatus.textContent = '请选择图片文件'; scanStatus.style.color = '#e74c3c'; return;
    }
    scanStatus.textContent = '正在识别...'; scanStatus.style.color = '#999';
    scanResult.style.display = 'none'; scanBtns.style.display = 'none';

    var reader = new FileReader();
    reader.onload = function(e) {
      var img = new Image();
      img.onload = function() {
        scanPreview.src = e.target.result; scanPreview.style.display = 'block';
        var cvs = document.createElement('canvas');
        cvs.width = img.width; cvs.height = img.height;
        var ctx = cvs.getContext('2d');
        ctx.drawImage(img, 0, 0);
        var imageData = ctx.getImageData(0, 0, cvs.width, cvs.height);
        var code = jsQR(imageData.data, cvs.width, cvs.height);
        if (code) {
          scannedText = code.data;
          scanStatus.textContent = '识别成功'; scanStatus.style.color = '#27ae60';
          scanText.textContent = code.data;
          scanText.className = 'rtext' + (/^https?:\/\//i.test(code.data) ? ' link' : '');
          scanResult.style.display = 'block'; scanBtns.style.display = 'flex';
        } else {
          scanStatus.textContent = '未识别到二维码'; scanStatus.style.color = '#e74c3c';
        }
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  document.getElementById('scanCopy').addEventListener('click', function() {
    if (!scannedText) return;
    navigator.clipboard.writeText(scannedText).then(function() {
      scanStatus.textContent = '已复制到剪贴板'; scanStatus.style.color = '#27ae60';
    }).catch(function() {
      scanStatus.textContent = '复制失败，请手动复制'; scanStatus.style.color = '#e74c3c';
    });
  });

  document.getElementById('scanRegen').addEventListener('click', function() {
    if (!scannedText) return;
    genInput.value = scannedText;
    document.querySelector('.tab-btn[data-page="gen"]').click();
    doGenerate(scannedText);
  });

  // ====== Image to QR ======
  var imgDrop = document.getElementById('imgDrop');
  var imgFileInput = document.getElementById('imgFileInput');
  var imgStatus = document.getElementById('imgStatus');
  var imgRow = document.getElementById('imgRow');
  var imgThumb = document.getElementById('imgThumb');
  var imgQrBox = document.getElementById('imgQrBox');
  var imgInfo = document.getElementById('imgInfo');
  var imgDownload = document.getElementById('imgDownload');

  imgDrop.addEventListener('click', function() { imgFileInput.click(); });
  imgFileInput.addEventListener('change', function() {
    if (this.files.length) doImgEncode(this.files[0]);
  });

  imgDrop.addEventListener('dragover', function(e) { e.preventDefault(); this.classList.add('on'); });
  imgDrop.addEventListener('dragleave', function() { this.classList.remove('on'); });
  imgDrop.addEventListener('drop', function(e) {
    e.preventDefault(); this.classList.remove('on');
    if (e.dataTransfer.files.length) doImgEncode(e.dataTransfer.files[0]);
  });

  function doImgEncode(file) {
    if (!file || !file.type.match(/image\//)) {
      imgStatus.textContent = '请选择图片文件'; imgStatus.style.color = '#e74c3c'; return;
    }
    imgStatus.textContent = '正在压缩编码...'; imgStatus.style.color = '#999';
    imgRow.style.display = 'none';
    imgDownload.disabled = true;

    var reader = new FileReader();
    reader.onload = function(ev) {
      var img = new Image();
      img.onload = function() {
        try {
          // Target very small image — data URL must be short for scannable QR
          var maxDim = 30;
          var ow = img.width, oh = img.height;
          var w, h;
          var ratio = ow / oh;
          if (ratio >= 1) { w = Math.min(ow, maxDim); h = Math.max(1, Math.round(w / ratio)); }
          else { h = Math.min(oh, maxDim); w = Math.max(1, Math.round(h * ratio)); }

          imgThumb.width = w; imgThumb.height = h;
          var ctx = imgThumb.getContext('2d');
          ctx.clearRect(0, 0, w, h);
          ctx.drawImage(img, 0, 0, w, h);

          var dataUrl = imgThumb.toDataURL('image/jpeg', 0.06);
          var bytes = Math.round(dataUrl.length * 0.75);
          imgInfo.textContent = '编码: ' + dataUrl.length + ' 字符 (~' + bytes + ' bytes)';

          if (dataUrl.length > 2900) {
            imgStatus.textContent = '图片复杂度过高，请换一张简单图片'; imgStatus.style.color = '#e74c3c';
            return;
          }

          imgQrBox.innerHTML = '';
          imgQrCode = new QRCode(imgQrBox, {
            text: dataUrl, width: 200, height: 200,
            colorDark: '#000000', colorLight: '#ffffff',
            correctLevel: QRCode.CorrectLevel.L
          });

          imgStatus.textContent = '生成成功，扫描二维码即可查看图片'; imgStatus.style.color = '#27ae60';
          imgRow.style.display = 'flex';
          imgDownload.disabled = false;
        } catch(err) {
          imgStatus.textContent = '编码失败: ' + err.message; imgStatus.style.color = '#e74c3c';
        }
      };
      img.onerror = function() {
        imgStatus.textContent = '图片加载失败，请尝试其他图片'; imgStatus.style.color = '#e74c3c';
      };
      img.src = ev.target.result;
    };
    reader.onerror = function() {
      imgStatus.textContent = '文件读取失败'; imgStatus.style.color = '#e74c3c';
    };
    reader.readAsDataURL(file);
  }

  imgDownload.addEventListener('click', function() {
    var c = imgQrBox.querySelector('canvas');
    if (!c) return;
    var a = document.createElement('a');
    a.download = '图片二维码.png'; a.href = c.toDataURL('image/png'); a.click();
  });

  document.getElementById('imgClear').addEventListener('click', function() {
    imgFileInput.value = ''; imgQrBox.innerHTML = '';
    var ctx = imgThumb.getContext('2d');
    ctx.clearRect(0, 0, imgThumb.width, imgThumb.height);
    imgThumb.width = 100; imgThumb.height = 100;
    imgRow.style.display = 'none'; imgInfo.textContent = '';
    imgStatus.textContent = ''; imgQrCode = null; imgDownload.disabled = true;
  });

});
</script>
<script>
(function() {
  var c = document.getElementById('bgCanvas');
  var ctx = c.getContext('2d');
  var PX = 8; // pixel size
  var W, H, COLS, ROWS;
  var dots = [];
  var tetrisBlocks = [];
  var snakeParts = [];
  var pacman = { x: 0, y: 0, dir: 1, mouth: 0, mouthDir: 1 };
  var ghosts = [];
  var frame = 0;

  function resize() {
    c.width = window.innerWidth;
    c.height = window.innerHeight;
    W = c.width; H = c.height;
    COLS = Math.ceil(W / PX) + 1;
    ROWS = Math.ceil(H / PX) + 1;
    initDots();
  }

  function initDots() {
    dots = [];
    // Random scattered dots (like Pac-Man pellets)
    for (var i = 0; i < 80; i++) {
      dots.push({ x: Math.floor(Math.random() * COLS), y: 2 + Math.floor(Math.random() * (ROWS - 4)) });
    }
    // Power pellets (bigger, fewer)
    for (var i = 0; i < 8; i++) {
      dots.push({ x: Math.floor(Math.random() * COLS), y: 2 + Math.floor(Math.random() * (ROWS - 4)), big: true });
    }
    // Tetris blocks - initialize
    tetrisBlocks = [];
    for (var i = 0; i < 5; i++) {
      spawnTetrisBlock(Math.floor(Math.random() * ROWS));
    }
    // Snake
    snakeParts = [];
    var sx = Math.floor(Math.random() * COLS);
    var sy = Math.floor(Math.random() * ROWS);
    for (var i = 0; i < 12; i++) {
      snakeParts.push({ x: sx - i, y: sy });
    }
    // Pac-Man
    pacman.x = 0;
    pacman.y = Math.floor(ROWS / 2);
    pacman.dir = 1;
    // Ghosts
    ghosts = [];
    var ghostColors = ['#ff6b6b', '#ffb86c', '#77dd77', '#6cb4ff'];
    for (var g = 0; g < 3; g++) {
      ghosts.push({
        x: Math.floor(COLS * 0.6) + Math.floor(Math.random() * COLS * 0.3),
        y: 2 + Math.floor(Math.random() * (ROWS - 4)),
        dx: (Math.random() > 0.5 ? 1 : -1) * (0.3 + Math.random() * 0.7),
        dy: (Math.random() > 0.5 ? 1 : -1) * (0.3 + Math.random() * 0.5),
        color: ghostColors[g]
      });
    }
  }

  function spawnTetrisBlock(row) {
    var shapes = [
      [[1,1,1,1]], // I
      [[1,1],[1,1]], // O
      [[0,1,0],[1,1,1]], // T
      [[1,0,0],[1,1,1]], // L
      [[0,0,1],[1,1,1]], // J
      [[0,1,1],[1,1,0]], // S
      [[1,1,0],[0,1,1]], // Z
    ];
    var colors = ['#ff6b6b','#ffb86c','#f1fa8c','#77dd77','#6cb4ff','#bd93f9','#ff79c6'];
    var idx = Math.floor(Math.random() * shapes.length);
    tetrisBlocks.push({
      shape: shapes[idx],
      color: colors[idx],
      x: Math.floor(Math.random() * (COLS - 6)),
      y: row !== undefined ? row : -4,
      speed: 0.02 + Math.random() * 0.04
    });
  }

  function drawPixel(x, y, color, alpha) {
    ctx.fillStyle = color;
    ctx.globalAlpha = alpha !== undefined ? alpha : 0.35;
    ctx.fillRect(x * PX, y * PX, PX, PX);
  }

  function drawShape(ox, oy, shape, color, alpha) {
    for (var r = 0; r < shape.length; r++) {
      for (var c = 0; c < shape[r].length; c++) {
        if (shape[r][c]) drawPixel(ox + c, oy + r, color, alpha);
      }
    }
  }

  function drawPacman(cx, cy, mouthAngle) {
    var s = PX * 2;
    ctx.save();
    ctx.translate(cx * PX + PX, cy * PX + PX);
    ctx.globalAlpha = 0.45;
    ctx.fillStyle = '#f1fa8c';
    ctx.beginPath();
    if (pacman.dir === 1) {
      ctx.arc(0, 0, s, mouthAngle, Math.PI * 2 - mouthAngle);
    } else {
      ctx.arc(0, 0, s, Math.PI + mouthAngle, Math.PI - mouthAngle);
    }
    ctx.lineTo(0, 0);
    ctx.fill();
    ctx.restore();
  }

  function drawGhost(cx, cy, color) {
    var s = PX * 2;
    ctx.save();
    ctx.translate(cx * PX + PX, cy * PX + PX);
    ctx.globalAlpha = 0.35;
    ctx.fillStyle = color;
    // Ghost body
    ctx.beginPath();
    ctx.arc(0, -PX * 0.3, s, Math.PI, 0);
    ctx.lineTo(s, s * 1.2);
    // Wavy bottom
    for (var w = s; w > -s; w -= s / 2) {
      ctx.lineTo(w - s / 2, s * 0.6);
      ctx.lineTo(w - s, s * 1.2);
    }
    ctx.lineTo(-s, -PX * 0.3);
    ctx.fill();
    // Eyes
    ctx.globalAlpha = 0.6;
    ctx.fillStyle = '#fff';
    ctx.fillRect(-s + PX, -s + PX * 0.2, PX * 1.5, PX * 1.5);
    ctx.fillRect(s - PX * 2.5, -s + PX * 0.2, PX * 1.5, PX * 1.5);
    ctx.fillStyle = '#0a0a1a';
    ctx.fillRect(-s + PX * 1.5, -s + PX * 0.5, PX, PX);
    ctx.fillRect(s - PX * 1.5, -s + PX * 0.5, PX, PX);
    ctx.restore();
  }

  function animate() {
    frame++;
    ctx.clearRect(0, 0, W, H);

    // Draw grid lines (very faint)
    ctx.globalAlpha = 0.03;
    ctx.strokeStyle = '#667eea';
    ctx.lineWidth = 0.5;
    for (var gx = 0; gx < W; gx += PX * 4) {
      ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, H); ctx.stroke();
    }
    for (var gy = 0; gy < H; gy += PX * 4) {
      ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(W, gy); ctx.stroke();
    }

    // Draw dots (Pac-Man pellets)
    for (var i = 0; i < dots.length; i++) {
      var dot = dots[i];
      if (dot.big) {
        ctx.globalAlpha = 0.15 + Math.sin(frame * 0.05 + i) * 0.1;
        ctx.fillStyle = '#f1fa8c';
        ctx.beginPath();
        ctx.arc(dot.x * PX + PX * 0.5, dot.y * PX + PX * 0.5, PX * 1.2, 0, Math.PI * 2);
        ctx.fill();
      } else {
        ctx.globalAlpha = 0.12;
        ctx.fillStyle = '#ffb86c';
        ctx.fillRect(dot.x * PX + PX * 0.3, dot.y * PX + PX * 0.3, PX * 0.4, PX * 0.4);
      }
      // Reset dot when pac-man passes
      if (Math.abs(pacman.x - dot.x) < 1.5 && Math.abs(pacman.y - dot.y) < 1.5) {
        dot.x = Math.floor(Math.random() * COLS);
        dot.y = 2 + Math.floor(Math.random() * (ROWS - 4));
      }
    }

    // Animate and draw Tetris blocks
    ctx.globalAlpha = 0.18;
    for (var t = 0; t < tetrisBlocks.length; t++) {
      var block = tetrisBlocks[t];
      block.y += block.speed;
      if (block.y > ROWS) {
        spawnTetrisBlock(-4);
        tetrisBlocks.splice(t, 1);
        t--;
        continue;
      }
      drawShape(Math.floor(block.x), Math.floor(block.y), block.shape, block.color, 0.2);
    }
    // Keep ~5 blocks
    while (tetrisBlocks.length < 5) spawnTetrisBlock();

    // Animate snake
    if (frame % 8 === 0) {
      var head = snakeParts[0];
      var newHead = { x: head.x, y: head.y };
      if (frame % 40 < 20) newHead.x += 1;
      else if (frame % 60 < 20) newHead.y += 1;
      else if (frame % 80 < 20) newHead.x -= 1;
      else if (frame % 100 < 20) newHead.y -= 1;
      else newHead.x += 1;

      if (newHead.x < 0) newHead.x = COLS;
      if (newHead.x > COLS) newHead.x = 0;
      if (newHead.y < 0) newHead.y = ROWS;
      if (newHead.y > ROWS) newHead.y = 0;

      snakeParts.unshift(newHead);
      if (snakeParts.length > 14) snakeParts.pop();
    }

    // Draw snake
    for (var s = 0; s < snakeParts.length; s++) {
      var alpha = 0.25 - (s / snakeParts.length) * 0.2;
      var green = 200 - s * 10;
      drawPixel(snakeParts[s].x, snakeParts[s].y, 'rgb(100,' + green + ',80)', alpha);
    }

    // Animate Pac-Man
    if (frame % 3 === 0) {
      pacman.x += pacman.dir * 0.3;
      if (pacman.x > COLS + 2) pacman.x = -2;
      if (pacman.x < -2) pacman.x = COLS + 2;
      pacman.mouth += 0.12 * pacman.mouthDir;
      if (pacman.mouth > 0.6) pacman.mouthDir = -1;
      if (pacman.mouth < 0.05) pacman.mouthDir = 1;
    }
    drawPacman(pacman.x, pacman.y, pacman.mouth);

    // Animate and draw ghosts
    for (var g = 0; g < ghosts.length; g++) {
      var ghost = ghosts[g];
      ghost.x += ghost.dx * 0.15;
      ghost.y += ghost.dy * 0.15;
      if (ghost.x < 0 || ghost.x > COLS) ghost.dx *= -1;
      if (ghost.y < 2 || ghost.y > ROWS - 2) ghost.dy *= -1;
      drawGhost(ghost.x, ghost.y, ghost.color);
    }

    // Pixel rain (subtle falling pixels like Tetris dust)
    ctx.globalAlpha = 0.08;
    for (var r = 0; r < 3; r++) {
      var rx = Math.floor(Math.random() * COLS);
      var ry = Math.floor(Math.random() * ROWS);
      ctx.fillStyle = ['#6cb4ff','#bd93f9','#ff79c6'][r];
      ctx.fillRect(rx * PX, ry * PX, PX, PX);
    }

    requestAnimationFrame(animate);
  }

  resize();
  window.addEventListener('resize', function() {
    resize();
  });
  animate();
})();
</script>
